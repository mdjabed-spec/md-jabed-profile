<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHOENIX GRAY | Official Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* * PREMIUM THEME CONFIGURATION 
         */
        :root {
            --bg-color: #0a0a0a;
            --gold: #d4af37;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.3);
            --text-main: #ffffff;
            --blue-verified: #1da1f2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Particle Background Canvas */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* * GLASSMORPHISM CARD 
         */
        .profile-card {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 450px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border: 2px solid var(--glass-border);
            padding: 40px 25px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(212, 175, 55, 0.1);
            animation: fadeIn 1.2s ease-in-out;
        }

        /* Animated Golden Border */
        .profile-card::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 42px;
            padding: 2px;
            background: linear-gradient(45deg, var(--gold), transparent, var(--gold));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderRotate 4s linear infinite;
        }

        /* Profile Picture Styling */
        .img-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--gold);
            box-shadow: 0 0 20px var(--gold);
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.05);
        }

        /* Name & Badge */
        .name-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .name {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, #fff, var(--gold), #fff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shine 3s infinite linear;
        }

        .verified-badge {
            color: var(--blue-verified);
            font-size: 1.2rem;
        }

        /* Bio */
        .bio {
            font-size: 1rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        /* Links/Buttons */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--gold);
            color: var(--gold);
            text-decoration: none;
            border-radius: 15px;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .btn:hover {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 20px var(--gold);
            transform: translateY(-5px);
        }

        footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: var(--gold);
            opacity: 0.6;
        }

        /* Keyframe Animations */
        @keyframes borderRotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        @keyframes shine {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <main class="profile-card">
        <div class="img-container">

        </div>

        <div class="name-wrapper">
            <h1 class="name">PHOENIX GRAY</h1>

        </div>

        <div class="bio">
            ﷽<br>
            Assalamu Alaikum<br>
            Welcome To My Official Profile
        </div>

        <section class="links-container">
            <a href="https://www.facebook.com/share/17dk3VNyaz/" class="btn"><i class="fab fa-facebook"></i> Facebook</a>
            <a href="https://tiktok.com/@phoenix.gray2.0" class="btn"><i class="fab fa-tiktok"></i> TikTok</a>
            <a href="https://wa.me/8801843373682" class="btn"><i class="fab fa-whatsapp"></i> WhatsApp</a>
            <a href="tel:+8801843373682" class="btn"><i class="fas fa-phone"></i> Call Now</a>
            <a href="mailto:mrhacker04564096@gmail.com" class="btn"><i class="fas fa-envelope"></i> Email Me</a>
        </section>

        <footer>
            &copy; 2026 PHOENIX GRAY. All Rights Reserved.
        </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

            },

        });
    </script>
</body>
</html>
